services:
  llama-qwen3-coder:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server-qwen3-coder

    gpus: all

    volumes:
      - /opt/stacks/shared-ai-models:/models:ro

    ports:
      - "18080:18080"

    command:
      [
        "-m", "/models/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M.gguf",
        "--host", "0.0.0.0",
        "--port", "18080",
        "--n-gpu-layers", "999"
      ]

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18080/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s

    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui

    volumes:
      - open-webui-data:/app/backend/data

    ports:
      - "3000:8080"

    environment:
      - OPENAI_API_BASE_URL=http://llama-qwen3-coder:18080/v1
      - OPENAI_API_KEY=sk-no-key-required
      - WEBUI_AUTH=false

    depends_on:
      llama-qwen3-coder:
        condition: service_healthy

    restart: unless-stopped

volumes:
  open-webui-data:
